## Field Pocket Watch — component dependencies
##
## Resolved by the ESP-IDF component manager. This manifest lives in main/
## (the manager only reads idf_component.yml inside component directories,
## not the repo root).

dependencies:
  idf:
    version: ">=5.4.1"

  ## Board Support Package for the Waveshare ESP32-S3-Touch-AMOLED-2.06.
  ## Provides the SH8601/CO5300 QSPI AMOLED panel, FT3168 touch, AXP2101 PMU,
  ## ES8311/ES7210 audio, SD/SPIFFS, and starts the LVGL port task.
  ##
  ## NOT listed here as a managed (git) dependency: the component ships a
  ## CHECKSUMS.json, and git checkout on Windows rewrites line endings (CRLF),
  ## which fails the component manager's integrity check. Instead the BSP is
  ## vendored as a git submodule at components/esp32_s3_touch_amoled_2_06
  ## (a local component, not hash-validated). Its own idf_component.yml pulls
  ## LVGL, esp_lvgl_port, esp_lcd_sh8601, esp_lcd_touch_ft5x06 and
  ## esp_codec_dev transitively.

  ## --- Enabled in Step 2 (sensors) ---
  ## QMI8658 IMU (steps + wrist-wake) is NOT covered by the BSP (BSP_CAPS_IMU=0).
  ## PCF85063 RTC driver (pcf85063a) can be vendored from the S3Watch bsp_extra.
  # waveshare/qmi8658: "*"

  ## --- Enabled later (app framework) ---
  ## esp-brookesia app lifecycle + services. When added, pin lvgl/lvgl to a
  ## version that satisfies both the BSP (>=8,<10) and esp-brookesia.
  # espressif/esp-brookesia: ">=0.7.0"
